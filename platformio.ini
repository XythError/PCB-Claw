; PCB-Claw — Ultra-Efficient AI Assistant for ESP32-S3-WROOM-1-N16R8
; PlatformIO configuration

[platformio]
default_envs = esp32s3

; ─────────────────────────────────────────────────────────────────
; ESP32-S3-WROOM-1-N16R8  (16 MB Flash, 8 MB OPI-PSRAM, dual LX7)
; ─────────────────────────────────────────────────────────────────
[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Flash / PSRAM
board_build.flash_size    = 16MB
board_build.psram_type    = opi
board_build.partitions    = partitions_16MB.csv

; Use USB-CDC for logging (built-in USB on S3)
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=c++17
    -Wno-deprecated-declarations
    -DCORE_DEBUG_LEVEL=3

upload_speed  = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize

; LittleFS data folder (config .md files)
board_build.filesystem = littlefs
data_dir = data

lib_deps =
    bblanchon/ArduinoJson @ ^7.2.1
    me-no-dev/ESP Async WebServer @ ^1.2.3
    me-no-dev/AsyncTCP @ ^1.1.1
    ; ── Optional: enable real Lua execution for ScriptEngine ──────
    ; To activate, un-comment the Lua library below and add
    ; -DPCBCLAW_LUA_ENABLED=1 to build_flags.
    ; Any Lua 5.1-compatible Arduino port will work, e.g.:
    ;   makuna/Lua @ ^1.0.0

; ─────────────────────────────────────────────────────────────────
; Native environment for unit tests (no hardware needed)
; ─────────────────────────────────────────────────────────────────
[env:native]
platform  = native
lib_deps  =
    bblanchon/ArduinoJson @ ^7.2.1
build_flags =
    -std=c++17
    -DNATIVE_BUILD
    -DUNIT_TEST
test_build_src = yes
